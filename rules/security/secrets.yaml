pack: secrets
category: secrets
description: >-
  Detect credentials, keys, and tokens committed to the repository or exposed
  at runtime. Cross-reference with gitleaks/trivy output and the in-house
  secrets scanner.
checks:
  - id: SEC-001
    title: No hardcoded credentials or API keys in source
    guidance: >-
      Flag literal passwords, API keys, cloud credentials, and private keys.
      Verify each hit is real (not a placeholder or test fixture).
    severity: high
  - id: SEC-002
    title: Secrets sourced from environment/secret manager
    guidance: >-
      Confirm secrets are read from env/secret store, not committed config.
    severity: medium
  - id: SEC-003
    title: No secrets in logs or error output
    guidance: >-
      Flag logging of tokens, passwords, or full request bodies containing
      credentials.
    severity: medium
  - id: SEC-004
    title: .env and key files are git-ignored
    guidance: >-
      Confirm .env, keystores, and credential files are excluded from version
      control.
    severity: medium
  - id: SEC-005
    title: No private keys committed
    guidance: >-
      Flag PEM/PKCS private keys, .p12/.jks keystores, and SSH keys in the tree.
    severity: critical
