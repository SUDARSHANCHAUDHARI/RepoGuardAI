name: Reusable RepoGuard Security

on:
  workflow_call:
    inputs:
      repoguard_ref:
        description: Immutable RepoGuardAI tag or commit to execute.
        type: string
        required: false
        default: v1
      scope:
        description: RepoGuard audit scope.
        type: string
        required: false
        default: security
      fail_on:
        description: Lowest active severity that fails the scan.
        type: string
        required: false
        default: high
      upload_sarif:
        description: Upload SARIF when GitHub code scanning is available.
        type: boolean
        required: false
        default: false
      report_issues:
        description: Synchronize the critical/high issue on trusted runs.
        type: boolean
        required: false
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout target
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run OSV Scanner
        id: osv
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

      - name: Checkout RepoGuardAI tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: SUDARSHANCHAUDHARI/RepoGuardAI
          ref: ${{ inputs.repoguard_ref }}
          path: .repoguard-tool
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 10.28.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install RepoGuardAI
        run: pnpm --dir .repoguard-tool install --frozen-lockfile

      - name: Build RepoGuardAI
        run: pnpm --dir .repoguard-tool build

      - name: Install pinned Semgrep CE
        run: python3 -m pip install --disable-pip-version-check semgrep==1.169.0

      - name: Run RepoGuardAI
        id: repoguard
        continue-on-error: true
        uses: ./.repoguard-tool
        with:
          target: .
          scope: ${{ inputs.scope }}
          fail-on: ${{ inputs.fail_on }}

      - name: Upload RepoGuard reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repoguard-security-reports
          path: repoguard-results/
          if-no-files-found: error
          retention-days: 14

      - name: Apply final scan result
        if: always()
        env:
          REPOGUARD_OUTCOME: ${{ steps.repoguard.outcome }}
          OSV_OUTCOME: ${{ steps.osv.outcome }}
          GITLEAKS_OUTCOME: ${{ steps.gitleaks.outcome }}
        run: |
          if [ "$REPOGUARD_OUTCOME" != "success" ] || [ "$OSV_OUTCOME" != "success" ] || [ "$GITLEAKS_OUTCOME" != "success" ]; then
            exit 1
          fi

  sarif:
    if: ${{ always() && inputs.upload_sarif }}
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Download reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: repoguard-security-reports
          path: reports

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          sarif_file: reports/reports/audit-report.sarif

  issue:
    if: ${{ always() && inputs.report_issues && github.event_name != 'pull_request' }}
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout RepoGuardAI reporter
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: SUDARSHANCHAUDHARI/RepoGuardAI
          ref: ${{ inputs.repoguard_ref }}
          path: .repoguard-tool
          persist-credentials: false

      - name: Download reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: repoguard-security-reports
          path: reports

      - name: Synchronize security issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPORT_PATH: reports/reports/audit-report.json
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node .repoguard-tool/action-dist/github-issue.js
